<!DOCTYPE html>
<html>
<head>
    <title>Inventario</title>
</head>
<body>
    <h1>Inventario de Libros</h1>
    <table border="1" cellpadding="8" cellspacing="0">
        <thead>
            <tr>
                <th>Libro</th>
                <th>Precio</th>
                <th>Stock</th>
            </tr>
        </thead>
        <tbody>
            {% for item in inventario %}
                <tr>
                    <td>{{ item.libro.titulo }}</td>
                    <td>${{ item.libro.precio }}</td>
                    <td>{{ item.cantidad }}</td>
                </tr>
            {% empty %}
                <tr>
                    <td colspan="3">No hay datos de inventario.</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
